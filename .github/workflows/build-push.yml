name: Build and Push

on:
push:
    branches:
    - main

jobs:
build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
        uses: actions/checkout@v3

    - name: Log in to ACR
        run: echo "${{ secrets.AZURE_ACR_PASSWORD }}" | docker login ${{ secrets.AZURE_ACR_NAME }}.azurecr.io -u ${{ secrets.AZURE_ACR_NAME }} --password-stdin

    - name: Build Docker Image
        run: docker build -t ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/espocrm:latest ./apache

    - name: Push Docker Image
        run: docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/espocrm:latest
