name: Trigger auto deployment for occupancy-api-container

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/occupancy-api-container-AutoDeployTrigger-4dc1d42b-ce45-48e8-bff6-90015e4c2ea6.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.OCCUPANCYAPICONTAINER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.OCCUPANCYAPICONTAINER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.OCCUPANCYAPICONTAINER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: occupancyregistry.azurecr.io
          registryUsername: ${{ secrets.OCCUPANCYAPICONTAINER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.OCCUPANCYAPICONTAINER_REGISTRY_PASSWORD }}
          containerAppName: occupancy-api-container
          resourceGroup: occupancy-rg
          imageToBuild: occupancyregistry.azurecr.io/occupancy-api-container:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


